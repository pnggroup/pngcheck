name: build
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.job }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true

jobs:
  load-matrix:
    name: Load Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set matrix outputs
        id: set-matrix
        run: |
          echo "matrix=$(jq -c '.' matrix.json)" >> $GITHUB_OUTPUT

  build:
    name: ${{ matrix.name }}-cmake
    runs-on: ${{ matrix.runner }}
    needs: load-matrix

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-matrix.outputs.matrix) }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # MSYS2 setup
    - name: Setup MSYS2
      if: matrix.os == 'windows-msys2'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msys }}
        path-type: minimal
        update: true
        install: >-
          git
          make
        pacboy: >-
          toolchain:p
          zlib:p
          cmake:p

    # Ubuntu dependencies
    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential zlib1g-dev

    # macOS dependencies
    - name: Install dependencies (macOS)
      if: matrix.os == 'macos'
      run: |
        # Check if zlib is installed, install if not
        if ! brew list zlib &>/dev/null; then
          brew install zlib
        else
          echo "zlib already installed"
        fi

    # Windows dependencies
    - name: Setup MSVC (Windows)
      if: matrix.os == 'windows'
      uses: microsoft/setup-msbuild@v2

    - name: Install vcpkg dependencies (Windows)
      if: matrix.os == 'windows'
      run: |
        $arch = if ("${{ matrix.runner }}" -eq "windows-11-arm") { "arm64" } else { "x64" }
        vcpkg install zlib:$arch-windows

    # CMake builds using presets
    - name: Build with CMake (macOS)
      if: matrix.os == 'macos'
      run: |
        cmake --preset Release \
          -DCMAKE_OSX_ARCHITECTURES=${{ matrix.runner == 'macos-13' && 'x86_64' || 'arm64' }}
        cmake --build --preset Release

    - name: Build with CMake (Ubuntu)
      if: matrix.os == 'ubuntu'
      run: |
        cmake --preset Release
        cmake --build --preset Release

    - name: Build with CMake (Windows MSVC)
      if: matrix.os == 'windows'
      run: |
        $arch = if ("${{ matrix.runner }}" -eq "windows-11-arm") { "ARM64" } else { "x64" }
        cmake --preset Release -A $arch -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        cmake --build --preset Release

    - name: Build with CMake (Windows MSYS2)
      if: matrix.os == 'windows-msys2'
      shell: msys2 {0}
      run: |
        cmake --preset Release -G "MSYS Makefiles"
        cmake --build --preset Release

    # Testing CMake builds
    - name: Test CMake build (MSYS2)
      if: matrix.os == 'windows-msys2'
      shell: msys2 {0}
      run: |
        build/Release/pngcheck.exe -h

    - name: Test CMake build (Windows MSVC)
      if: matrix.os == 'windows'
      run: |
        build/Release/pngcheck.exe -h

    - name: Test CMake build (Unix/macOS)
      if: matrix.os == 'ubuntu' || matrix.os == 'macos'
      run: |
        ./build/Release/pngcheck -h

    # Setup Ruby 3.4 for Ceedling (skip MSYS2 due to installation issues)
    - name: Setup Ruby 3.4
      if: matrix.os != 'windows-msys2'
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'
        bundler-cache: true

    # Cache PNG suite test files (skip MSYS2 due to installation issues)
    - name: Cache PNG suite test files
      if: matrix.os != 'windows-msys2'
      uses: actions/cache@v4
      with:
        path: test/fixtures/pngsuite
        key: pngsuite-fixtures-${{ hashFiles('test/generate_expectations.sh') }}
        restore-keys: |
          pngsuite-fixtures-

    # Download PNG test files before running tests (skip MSYS2 due to installation issues)
    - name: Download PNG test files
      if: matrix.os != 'windows-msys2'
      run: |
        cmake --build build/Release --target pngsuite-download

    # Run tests using CMake targets (skip MSYS2 due to installation issues)
    - name: Run tests with CMake
      if: matrix.os != 'windows-msys2'
      run: |
        cmake --build build/Release --target test-all

    # Upload test reports as artifacts (skip MSYS2 since no tests run)
    - name: Upload test reports
      if: always() && matrix.os != 'windows-msys2'
      uses: actions/upload-artifact@v4
      with:
        name: test-reports-${{ matrix.name }}-cmake
        path: |
          build/artifacts/test/
          build/logs/
          *.xml
          *.json
        retention-days: 30

    # Upload test results for GitHub's test reporting (skip MSYS2 since no tests run)
    - name: Publish Test Results
      if: always() && matrix.os != 'windows-msys2'
      uses: dorny/test-reporter@v1
      with:
        name: Unity Tests (${{ matrix.name }}, CMake)
        path: 'build/artifacts/test/junit_tests_report.xml'
        reporter: java-junit
        fail-on-error: true

    # Upload test results on failure for debugging (skip MSYS2 since no tests run)
    - name: Upload test results on failure
      if: failure() && matrix.os != 'windows-msys2'
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.name }}
        path: |
          test/fixtures/
          test/expectations/
          *.log
        retention-days: 7

    # Artifacts
    - name: Prepare artifacts (MSYS2)
      if: matrix.os == 'windows-msys2'
      shell: msys2 {0}
      run: |
        mkdir -p artifacts
        cp build/Release/pngcheck.exe artifacts/pngcheck-${{ matrix.name }}-cmake.exe
        cd artifacts
        sha256sum * > checksums.txt

    - name: Prepare artifacts (Windows MSVC)
      if: matrix.os == 'windows'
      run: |
        mkdir -p artifacts
        cp build/Release/pngcheck.exe artifacts/pngcheck-${{ matrix.name }}-cmake.exe
        cd artifacts
        Get-FileHash -Algorithm SHA256 *.exe | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } > checksums.txt

    - name: Prepare artifacts (Unix/macOS)
      if: matrix.os == 'ubuntu' || matrix.os == 'macos'
      run: |
        mkdir -p artifacts
        cp build/Release/pngcheck artifacts/pngcheck-${{ matrix.name }}-cmake
        cd artifacts
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum * > checksums.txt
        elif command -v shasum >/dev/null 2>&1; then
          shasum -a 256 * > checksums.txt
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pngcheck-${{ matrix.name }}-cmake
        path: artifacts/
        retention-days: 30

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # Ubuntu dependencies
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential zlib1g-dev

    # Setup Ruby 3.4 for Ceedling
    - name: Setup Ruby 3.4
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'
        bundler-cache: true

    # Install gcovr for coverage reporting
    - name: Install gcovr for coverage reporting
      run: |
        pip install gcovr

    # Cache PNG suite test files
    - name: Cache PNG suite test files
      uses: actions/cache@v4
      with:
        path: test/fixtures/pngsuite
        key: pngsuite-fixtures-${{ hashFiles('test/generate_expectations.sh') }}
        restore-keys: |
          pngsuite-fixtures-

    # Build with coverage flags
    - name: Build with coverage
      run: |
        cmake --preset Debug -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON
        cmake --build --preset Debug

    # Download PNG test files before running coverage tests
    - name: Download PNG test files
      run: |
        cmake --build build/Debug --target pngsuite-download

    # Run tests with coverage analysis
    - name: Run tests with coverage
      run: |
        cmake --build build/Debug --target test-coverage

    # Upload coverage report
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-html
        path: build/artifacts/gcov/
        retention-days: 30

    # Upload coverage to Codecov (optional)
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: build/artifacts/gcov/coverage.xml
        fail_ci_if_error: false
        verbose: true
