name: build
on:
  push:
    branches: [ main, rt-add-github-workflows ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.job }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true

jobs:
  load-matrix:
    name: Load Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set matrix outputs
        id: set-matrix
        run: |
          echo "matrix=$(jq -c '.' matrix.json)" >> $GITHUB_OUTPUT

  build:
    name: ${{ matrix.name }}-cmake
    runs-on: ${{ matrix.runner }}
    needs: load-matrix

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-matrix.outputs.matrix) }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # MSYS2 setup
    - name: Setup MSYS2
      if: matrix.os == 'windows-msys2'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msys }}
        path-type: minimal
        update: true
        install: >-
          git
          make
        pacboy: >-
          toolchain:p
          zlib:p
          cmake:p

    # Ubuntu dependencies
    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential zlib1g-dev

    # macOS dependencies
    - name: Install dependencies (macOS)
      if: matrix.os == 'macos'
      run: |
        # Check if zlib is installed, install if not
        if ! brew list zlib &>/dev/null; then
          brew install zlib
        else
          echo "zlib already installed"
        fi

    # Windows dependencies
    - name: Setup MSVC (Windows)
      if: matrix.os == 'windows'
      uses: microsoft/setup-msbuild@v2

    - name: Install vcpkg dependencies (Windows)
      if: matrix.os == 'windows'
      run: |
        $arch = if ("${{ matrix.runner }}" -eq "windows-11-arm") { "arm64" } else { "x64" }
        vcpkg install zlib:$arch-windows

    # CMake builds
    - name: Build with CMake (Ubuntu/macOS)
      if: matrix.os == 'ubuntu' || matrix.os == 'macos'
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DPNGCHECK_USE_SYSTEM_ZLIB=ON
        cmake --build build --config Release

    - name: Build with CMake (Windows MSVC)
      if: matrix.os == 'windows'
      run: |
        $arch = if ("${{ matrix.runner }}" -eq "windows-11-arm") { "ARM64" } else { "x64" }
        cmake -B build -A $arch -DCMAKE_BUILD_TYPE=Release -DPNGCHECK_USE_SYSTEM_ZLIB=ON -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        cmake --build build --config Release

    - name: Build with CMake (Windows MSYS2)
      if: matrix.os == 'windows-msys2'
      shell: msys2 {0}
      run: |
        cmake -B build \
          -G "MSYS Makefiles" \
          -DCMAKE_BUILD_TYPE=Release \
          -DPNGCHECK_USE_SYSTEM_ZLIB=ON
        cmake --build build --config Release

    # Testing CMake builds
    - name: Test CMake build (MSYS2)
      if: matrix.os == 'windows-msys2'
      shell: msys2 {0}
      run: |
        build/pngcheck.exe -h

    - name: Test CMake build (Windows MSVC)
      if: matrix.os == 'windows'
      run: |
        build/Release/pngcheck.exe -h

    - name: Test CMake build (Unix/macOS)
      if: matrix.os == 'ubuntu' || matrix.os == 'macos'
      run: |
        ./build/pngcheck -h

    # Setup test dependencies
    - name: Setup test dependencies (Ubuntu)
      if: matrix.os == 'ubuntu'
      run: |
        sudo apt-get install -y bats curl

    - name: Setup test dependencies (macOS)
      if: matrix.os == 'macos'
      run: |
        brew install bats-core

    - name: Setup test dependencies (Windows MSYS2)
      if: matrix.os == 'windows-msys2'
      shell: msys2 {0}
      run: |
        # Install dependencies for bats
        pacman -S --noconfirm curl unzip

        # Download and install bats manually
        curl -L https://github.com/bats-core/bats-core/archive/v1.10.0.tar.gz -o bats.tar.gz
        tar -xzf bats.tar.gz
        cd bats-core-1.10.0
        ./install.sh /usr/local
        cd ..
        rm -rf bats-core-1.10.0 bats.tar.gz

        # Verify bats installation
        bats --version

    - name: Setup test dependencies (Windows MSVC)
      if: matrix.os == 'windows'
      run: |
        npm install -g bats

    # Cache test fixtures to speed up subsequent runs
    - name: Cache PngSuite test fixtures
      uses: actions/cache@v4
      with:
        path: tests/fixtures/pngsuite
        key: pngsuite-fixtures-${{ hashFiles('tests/generate_expectations.sh') }}
        restore-keys: |
          pngsuite-fixtures-

    # Debug executable and environment
    - name: Debug executable and environment (Ubuntu/macOS)
      if: matrix.os == 'ubuntu' || matrix.os == 'macos'
      run: |
        echo "Current directory: $(pwd)"
        echo "Build directory contents:"
        ls -la build/ || echo "Build directory not found"
        echo "Checking executable:"
        ls -la ./build/pngcheck || echo "Executable not found"
        echo "Testing executable:"
        ./build/pngcheck -h || echo "Executable test failed"

    # Debug executable and environment
    - name: Debug executable and environment (Windows MSYS2)
      if: matrix.os == 'windows-msys2'
      shell: msys2 {0}
      run: |
        echo "Current directory: $(pwd)"
        echo "Build directory contents:"
        ls -la build/ || echo "Build directory not found"
        echo "Checking executable:"
        ls -la ./build/pngcheck.exe || echo "Executable not found"
        echo "Testing executable:"
        ./build/pngcheck.exe -h || echo "Executable test failed"

    - name: Debug executable and environment (Windows MSVC)
      if: matrix.os == 'windows'
      run: |
        echo "Current directory: $(pwd)"
        echo "Build directory contents:"
        Get-ChildItem build/ -ErrorAction SilentlyContinue || echo "Build directory not found"
        echo "Release directory contents:"
        Get-ChildItem build/Release/ -ErrorAction SilentlyContinue || echo "Release directory not found"
        echo "Checking executable:"
        Get-ChildItem ./build/Release/pngcheck.exe -ErrorAction SilentlyContinue || echo "Executable not found"
        echo "Testing executable:"
        ./build/Release/pngcheck.exe -h || echo "Executable test failed"

    # Download test fixtures and run comprehensive tests
    - name: Run pngcheck test suite (Ubuntu/macOS)
      if: matrix.os == 'ubuntu' || matrix.os == 'macos'
      env:
        PNGCHECK_EXECUTABLE: ../build/pngcheck
      run: |
        ./tests/run_tests.sh

    - name: Run pngcheck test suite (Windows MSYS2)
      if: matrix.os == 'windows-msys2'
      shell: msys2 {0}
      env:
        PNGCHECK_EXECUTABLE: ../build/pngcheck.exe
      run: |
        ./tests/run_tests.sh

    - name: Run pngcheck test suite (Windows MSVC)
      if: matrix.os == 'windows'
      env:
        PNGCHECK_EXECUTABLE: ../build/Release/pngcheck.exe
      run: |
        bash ./tests/run_tests.sh

    # Upload test results on failure for debugging
    - name: Upload test results on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.name }}
        path: |
          tests/fixtures/
          tests/expectations/
          *.log
        retention-days: 7

    # Artifacts
    - name: Prepare artifacts (MSYS2)
      if: matrix.os == 'windows-msys2'
      shell: msys2 {0}
      run: |
        mkdir -p artifacts
        cp build/pngcheck.exe artifacts/pngcheck-${{ matrix.name }}-cmake.exe
        cd artifacts
        sha256sum * > checksums.txt

    - name: Prepare artifacts (Windows MSVC)
      if: matrix.os == 'windows'
      run: |
        mkdir -p artifacts
        cp build/Release/pngcheck.exe artifacts/pngcheck-${{ matrix.name }}-cmake.exe
        cd artifacts
        Get-FileHash -Algorithm SHA256 *.exe | ForEach-Object { "$($_.Hash.ToLower())  $($_.Path | Split-Path -Leaf)" } > checksums.txt

    - name: Prepare artifacts (Unix/macOS)
      if: matrix.os == 'ubuntu' || matrix.os == 'macos'
      run: |
        mkdir -p artifacts
        cp build/pngcheck artifacts/pngcheck-${{ matrix.name }}-cmake
        cd artifacts
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum * > checksums.txt
        elif command -v shasum >/dev/null 2>&1; then
          shasum -a 256 * > checksums.txt
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pngcheck-${{ matrix.name }}-cmake
        path: artifacts/
        retention-days: 30
